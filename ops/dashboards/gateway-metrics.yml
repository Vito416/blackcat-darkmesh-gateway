# Grafana dashboard (YAML) for gateway cache/integrity/webhook health
apiVersion: 1
providers:
  - name: "gateway-metrics"
    orgId: 1
    folder: "Blackcat Mesh / Gateway"
    type: file
    options:
      path: /etc/grafana/dashboards/gateway-metrics.json

dashboard:
  title: "Gateway Cache, Integrity & PSP"
  tags: ["blackcat", "gateway"]
  timezone: browser
  panels:
    - title: "Cache hit/miss/expired"
      type: timeseries
      datasource: Prometheus
      targets:
        - expr: rate(gateway_cache_hit_total[5m])
          legendFormat: hit/s
        - expr: rate(gateway_cache_miss_total[5m])
          legendFormat: miss/s
        - expr: rate(gateway_cache_expired_total[5m])
          legendFormat: expired/s
    - title: "Cache size"
      type: stat
      datasource: Prometheus
      targets:
        - expr: gateway_cache_size
          legendFormat: cache_size
    - title: "Integrity fetch retry pressure"
      type: timeseries
      datasource: Prometheus
      targets:
        - expr: increase(gateway_integrity_snapshot_fetch_fail_total[5m])
          legendFormat: snapshot_fetch_fail/5m
        - expr: increase(gateway_integrity_mirror_fetch_fail_total[5m])
          legendFormat: mirror_fetch_fail/5m
    # Release signoff section: consistency trends and evidence readiness
    - title: "Release signoff: consistency mismatch / fetch-fail trends"
      type: timeseries
      datasource: Prometheus
      targets:
        - expr: increase(gateway_integrity_mirror_mismatch_total[5m])
          legendFormat: mismatch/5m
        - expr: increase(gateway_integrity_mirror_mismatch_total[15m])
          legendFormat: mismatch/15m
        - expr: increase(gateway_integrity_mirror_fetch_fail_total[5m])
          legendFormat: fetch_fail/5m
        - expr: increase(gateway_integrity_mirror_fetch_fail_total[15m])
          legendFormat: fetch_fail/15m
    - title: "Release signoff: evidence readiness indicators"
      type: stat
      datasource: Prometheus
      targets:
        - expr: gateway_integrity_checkpoint_age_seconds
          legendFormat: checkpoint_age_s
        - expr: gateway_integrity_audit_lag_seconds
          legendFormat: audit_lag_s
        - expr: increase(gateway_integrity_audit_stream_anomaly_total[15m])
          legendFormat: audit_anomaly/15m
        - expr: increase(gateway_integrity_mirror_mismatch_total[15m])
          legendFormat: mismatch/15m
        - expr: increase(gateway_integrity_mirror_fetch_fail_total[15m])
          legendFormat: fetch_fail/15m
        - expr: increase(gateway_webhook_replay_pruned_total[10m])
          legendFormat: replay_pruned/10m
    - title: "Checkpoint age vs audit lag"
      type: stat
      datasource: Prometheus
      targets:
        - expr: gateway_integrity_checkpoint_age_seconds
          legendFormat: checkpoint_age_s
        - expr: gateway_integrity_audit_lag_seconds
          legendFormat: audit_lag_s
    - title: "Rate limit tuning snapshot"
      type: stat
      datasource: Prometheus
      targets:
        - expr: gateway_ratelimit_effective_max_last
          legendFormat: effective_max
        - expr: gateway_ratelimit_override_count
          legendFormat: override_count
        - expr: gateway_ratelimit_buckets
          legendFormat: active_buckets
    - title: "Webhook verify / replay"
      type: timeseries
      datasource: Prometheus
      targets:
        - expr: rate(gateway_webhook_stripe_verify_fail_total[5m])
          legendFormat: stripe_verify_fail/s
        - expr: rate(gateway_webhook_paypal_verify_fail_total[5m])
          legendFormat: paypal_verify_fail/s
        - expr: rate(gateway_webhook_replay_total[5m])
          legendFormat: replay/s
    - title: "429 pressure"
      type: timeseries
      datasource: Prometheus
      targets:
        - expr: rate(gateway_ratelimit_blocked_total[5m])
          legendFormat: rate_limit_429/s
        - expr: rate(gateway_template_call_blocked_total[5m])
          legendFormat: template_blocked/s
    - title: "PSP breaker (write export)"
      type: timeseries
      datasource: Prometheus
      targets:
        - expr: write_psp_stripe_breaker_open
          legendFormat: stripe_breaker_open
        - expr: write_psp_paypal_breaker_open
          legendFormat: paypal_breaker_open
        - expr: write_psp_gopay_breaker_open
          legendFormat: gopay_breaker_open
        - expr: rate(worker_notify_breaker_open_total_stripe[5m])
          legendFormat: worker_notify_stripe_open/s
        - expr: rate(worker_notify_breaker_blocked_total_stripe[5m])
          legendFormat: worker_notify_stripe_blocked/s
        - expr: rate(worker_notify_breaker_open_total_paypal[5m])
          legendFormat: worker_notify_paypal_open/s
        - expr: rate(worker_notify_breaker_blocked_total_paypal[5m])
          legendFormat: worker_notify_paypal_blocked/s
        - expr: rate(worker_notify_breaker_open_total_gopay[5m])
          legendFormat: worker_notify_gopay_open/s
        - expr: rate(worker_notify_breaker_blocked_total_gopay[5m])
          legendFormat: worker_notify_gopay_blocked/s
    - title: "Metrics auth blocks"
      type: timeseries
      datasource: Prometheus
      targets:
        - expr: rate(gateway_metrics_auth_blocked_total[5m])
          legendFormat: metrics_401/s
    - title: "Cert cache pins/allow failures"
      type: timeseries
      datasource: Prometheus
      targets:
        - expr: rate(gateway_webhook_cert_pin_fail_total[10m])
          legendFormat: pin_fail/s
        - expr: rate(gateway_webhook_cert_allow_fail_total[10m])
          legendFormat: allow_fail/s
