server {
    listen 127.0.0.1:8745;
    server_name write.darkmesh.fun;
    absolute_redirect off;
    client_max_body_size 20m;

    # Drop common scanner noise before it reaches HyperBEAM.
    location ~* ^/(wp-admin|wordpress|xmlrpc\.php|\.git) {
        return 444;
    }

    # Push-style endpoints must be POST to avoid noisy 500s on malformed probes.
    location = /push {
        if ($request_method != POST) {
            return 405;
        }
        proxy_pass http://127.0.0.1:8734;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /~process@1.0/push {
        if ($request_method != POST) {
            return 405;
        }
        proxy_pass http://127.0.0.1:8734;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:8734;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffer_size 32k;
        proxy_buffers 8 32k;
        proxy_busy_buffers_size 64k;
    }
}
