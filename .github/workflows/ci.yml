name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install
        run: npm ci
      - name: Unit + metrics auth
        run: npm test -- --run tests/metrics-auth.test.ts
      - name: Webhook pen-tests
        run: npm test -- --run tests/webhook-pentest.test.ts
