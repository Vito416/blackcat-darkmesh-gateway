name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      gateway_base_url:
        description: Gateway base URL for incident smoke
        required: false
        type: string
      gateway_state_token:
        description: Optional /integrity/state token override
        required: false
        type: string
      gateway_incident_token:
        description: Incident token override
        required: false
        type: string
      gateway_template_token:
        description: Template token override
        required: false
        type: string
      gateway_smoke_timeout_ms:
        description: Smoke request timeout in milliseconds
        required: false
        type: string
      consistency_urls:
        description: Comma-separated URLs for integrity consistency comparison
        required: false
        type: string
      consistency_token:
        description: Optional token for consistency comparison
        required: false
        type: string
      evidence_urls:
        description: Comma-separated URLs for evidence dry-run export
        required: false
        type: string
      evidence_token:
        description: Optional token for evidence dry-run export
        required: false
        type: string

permissions:
  contents: read

jobs:
  test:
    name: Core build + full tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Use Node 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
      - name: Full test suite
        run: npm test
      - name: Unit + metrics auth
        run: npm test -- --run tests/metrics-auth.test.ts

  integrity-gate:
    name: Integrity gate
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Use Node 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'
      - name: Install
        run: npm ci
      - name: Run integrity gate
        run: npm run test:integrity-fast

  smoke:
    name: Smoke checks
    runs-on: ubuntu-24.04
    needs:
      - test
      - integrity-gate
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Use Node 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'
      - name: Install
        run: npm ci
      - name: PSP smoke (built dist)
        run: npm run smoke

  incident-smoke:
    name: Integrity incident smoke
    runs-on: ubuntu-24.04
    needs:
      - test
      - integrity-gate
    if: ${{ github.event_name == 'workflow_dispatch' || (secrets.GATEWAY_BASE_URL != '' && secrets.GATEWAY_INTEGRITY_INCIDENT_TOKEN != '' && secrets.GATEWAY_TEMPLATE_TOKEN != '') }}
    env:
      GATEWAY_BASE_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.gateway_base_url || secrets.GATEWAY_BASE_URL }}
      GATEWAY_INTEGRITY_STATE_TOKEN: ${{ github.event_name == 'workflow_dispatch' && inputs.gateway_state_token || secrets.GATEWAY_INTEGRITY_STATE_TOKEN }}
      GATEWAY_INTEGRITY_INCIDENT_TOKEN: ${{ github.event_name == 'workflow_dispatch' && inputs.gateway_incident_token || secrets.GATEWAY_INTEGRITY_INCIDENT_TOKEN }}
      GATEWAY_TEMPLATE_TOKEN: ${{ github.event_name == 'workflow_dispatch' && inputs.gateway_template_token || secrets.GATEWAY_TEMPLATE_TOKEN }}
      GATEWAY_SMOKE_TIMEOUT_MS: ${{ github.event_name == 'workflow_dispatch' && inputs.gateway_smoke_timeout_ms || '5000' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Use Node 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'
      - name: Install
        run: npm ci
      - name: Incident smoke (optional)
        run: npm run smoke:integrity-incident

  consistency-smoke:
    name: Integrity consistency smoke
    runs-on: ubuntu-24.04
    needs:
      - test
      - integrity-gate
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.consistency_urls != '' }}
    env:
      CONSISTENCY_URLS: ${{ inputs.consistency_urls }}
      CONSISTENCY_TOKEN: ${{ inputs.consistency_token }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Use Node 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'
      - name: Install
        run: npm ci
      - name: Compare integrity state
        run: |
          node <<'NODE'
          const { spawnSync } = require('node:child_process')

          const urls = (process.env.CONSISTENCY_URLS || '')
            .split(',')
            .map((url) => url.trim())
            .filter(Boolean)

          if (!urls.length) {
            console.error('[consistency-smoke] consistency_urls is required')
            process.exit(64)
          }

          const args = []
          for (const url of urls) {
            args.push('--url', url)
          }
          if (process.env.CONSISTENCY_TOKEN) {
            args.push('--token', process.env.CONSISTENCY_TOKEN)
          }

          const result = spawnSync('node', ['scripts/compare-integrity-state.js', ...args], {
            stdio: 'inherit',
            env: process.env,
          })

          process.exit(result.status ?? 1)
          NODE

  evidence-dry-run:
    name: Evidence dry run
    runs-on: ubuntu-24.04
    needs:
      - test
      - integrity-gate
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.evidence_urls != '' }}
    env:
      EVIDENCE_URLS: ${{ inputs.evidence_urls }}
      GATEWAY_INTEGRITY_STATE_TOKEN: ${{ inputs.evidence_token || secrets.GATEWAY_INTEGRITY_STATE_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Use Node 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'
      - name: Install
        run: npm ci
      - name: Help: compare
        run: npm run ops:compare-integrity -- --help
      - name: Help: attest
        run: npm run ops:attest-integrity -- --help
      - name: Help: export
        run: npm run ops:export-integrity-evidence -- --help
      - name: Help: validate
        run: npm run ops:validate-integrity-attestation -- --help
      - name: Help: bundle check
        run: npm run ops:check-evidence-bundle -- --help
      - name: Help: latest bundle
        run: npm run ops:latest-evidence-bundle -- --help
      - name: Help: dispatch
        run: npm run ops:dispatch-consistency-smoke -- --help
      - name: Evidence export dry-run
        run: |
          set -euo pipefail
          node <<'NODE'
          const { spawnSync } = require('node:child_process')

          const urls = (process.env.EVIDENCE_URLS || '')
            .split(',')
            .map((url) => url.trim())
            .filter(Boolean)

          if (urls.length < 2) {
            console.error('[evidence-dry-run] evidence_urls must contain at least two URLs')
            process.exit(64)
          }

          const outDir = `${process.env.RUNNER_TEMP}/integrity-evidence-dry-run`
          const exportArgs = ['scripts/export-integrity-evidence.js']
          for (const url of urls) {
            exportArgs.push('--url', url)
          }
          exportArgs.push('--out-dir', outDir)

          const exportResult = spawnSync('node', exportArgs, {
            stdio: 'inherit',
            env: process.env,
          })
          if ((exportResult.status ?? 1) !== 0) {
            process.exit(exportResult.status ?? 1)
          }

          const latestResult = spawnSync(
            'node',
            ['scripts/latest-evidence-bundle.js', '--root', outDir, '--json', '--require-files'],
            {
              encoding: 'utf8',
              stdio: ['ignore', 'pipe', 'inherit'],
              env: process.env,
            },
          )
          if ((latestResult.status ?? 1) !== 0) {
            process.exit(latestResult.status ?? 1)
          }

          let latest
          try {
            latest = JSON.parse(latestResult.stdout || '{}')
          } catch (err) {
            console.error(`[evidence-dry-run] unable to parse latest bundle output: ${err.message}`)
            process.exit(1)
          }

          const bundleDir = latest.bundleDir
          if (!bundleDir) {
            console.error('[evidence-dry-run] missing bundleDir from latest bundle output')
            process.exit(1)
          }

          const checkResult = spawnSync(
            'node',
            ['scripts/check-evidence-bundle.js', '--dir', bundleDir, '--strict'],
            {
              stdio: 'inherit',
              env: process.env,
            },
          )
          if ((checkResult.status ?? 1) !== 0) {
            process.exit(checkResult.status ?? 1)
          }

          const repo = process.env.GITHUB_REPOSITORY || ''
          const [owner, repoName] = repo.split('/')
          if (!owner || !repoName) {
            console.error('[evidence-dry-run] unable to resolve owner/repo from GITHUB_REPOSITORY')
            process.exit(1)
          }

          const dispatchArgs = [
            'scripts/dispatch-consistency-smoke.js',
            '--owner',
            owner,
            '--repo',
            repoName,
            '--workflow',
            'ci.yml',
            '--ref',
            process.env.GITHUB_REF_NAME || 'main',
            '--consistency-urls',
            urls.join(','),
            '--evidence-urls',
            urls.join(','),
            '--dry-run',
          ]
          const dispatchResult = spawnSync('node', dispatchArgs, {
            stdio: 'inherit',
            env: process.env,
          })

          process.exit(dispatchResult.status ?? 1)
          NODE
